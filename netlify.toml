# Copperhead — standalone Netlify site. The main icjia.illinois.gov site
# proxies /researchhub/* here at cutover (plan, Section 8).
#
# No environment variables are required to build in Phase 0. When the
# Strapi 5 content layer lands (Phase 1), the ONLY secret is a read-only
# build-time token — set in the Netlify UI, never in this file.

[build]
  # generate:full adds document-text extraction (searchable PDF/Office
  # bodies) before the Pagefind index; extraction is cached between
  # builds via node_modules/.cache.
  command = "pnpm generate:full"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "22"
  # Nitro auto-detects Netlify and would switch to its serverless preset;
  # force plain static output so the artifact is identical to local builds
  # (and 404.html exists for scripts/postgenerate.mjs).
  NITRO_PRESET = "static"

# Convenience on the bare preview domain: / -> /researchhub/
[[redirects]]
  from = "/"
  to = "/researchhub/"
  status = 302

# Security headers. CSP notes:
# - script-src 'unsafe-inline' is required by Nuxt's inline payload/head
#   scripts (static sites cannot use nonces); no external script origins
#   except the Plausible instance.
# - 'wasm-unsafe-eval' is required by Pagefind's WebAssembly engine.
# - img/connect allow the CMS (media) and Plausible (events).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://plausible.icjia.cloud; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://v2.hub.icjia-api.cloud; font-src 'self' data:; connect-src 'self' https://plausible.icjia.cloud; object-src 'none'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
