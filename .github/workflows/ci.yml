name: CI

on:
  push:
    branches: [main]
  pull_request:

# Every gate runs on every PR and push to main. No secrets are required —
# builds must never depend on a live CMS or privileged token (plan, A.3 P10).
jobs:
  quality:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  a11y:
    name: Accessibility (axe, WCAG 2.1 A/AA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate
      # Advisory until the cutover content sync; PARITY_STRICT=1 at launch.
      - run: pnpm parity
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:a11y

  lighthouse:
    name: Lighthouse budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate
      - run: pnpm lhci
